<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lets Talk | Tnaish</title>
    <link rel="stylesheet" href="css/contact.css">
    <link rel="shortcut icon" href="images/favicon.jpg">
    <link rel="stylesheet" href="css/experience-style.css" />
    <script src="https://kit.fontawesome.com/9fcb8631fd.js" crossorigin="anonymous"></script>
</head>
<body>
    <video class="back-vid" autoplay loop muted src="videos/galaxy.mp4"></video>

    <div class="vibrant-overlay"></div>

    <header>
        <div class="nav-wrapper">
            <div class="logo">
                <img src="images/mee.png" alt="logo" />
                <h1><span>Tanish</span></h1>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#info-section">About</a></li>
                <li><a href="index.html#tech-card">Tech Stack</a></li>
                <li><a href="index.html#experience-card">Experience</a></li>
                <li><a href="index.html#passion-card">Passion</a></li>
                <li>
                    <a href="index.html#flexibility-card">Flexibility & Collaboration</a>
                </li>
            </ul>
            <div class="socials">
                <a target="_blank" href="https://github.com/shahtanish-bit"><i class="fa-brands fa-github"></i></a>
                <a target="_blank" href="#"><i class="fa-brands fa-linkedin"></i></a>
                <a target="_blank" href="https://www.instagram.com/tanish_shah.100/"><i class="fa-brands fa-instagram"></i></a>
            </div>
        </div>
    </header>

    <section class="contatct-section">
        <div class="contact-container">
            <div class="contact-header">
                <h1>Lets work together</h1>
                <p>Impresed by me 😏 ? Feel free to reach out !!</p>
            </div>

            <div class="contact-content">
                <div class="contact-info">
                    <div class="info-item">
                        <i class="fa-solid fa-envelope"></i>
                        <div>
                            <h3>Email</h3>
                            <p>shahtansih0165@gmail.com</p>
                        </div>
                    </div>
                    <div class="info-item">
                        <i class="fa-solid fa-location-dot"></i>
                        <div>
                            <h3>Location</h3>
                            <p>Nepal</p>
                        </div>
                    </div>
                    <div class="info-item">
                        <i class="fa-solid fa-clock"></i>
                        <div>
                            <h3>Response Time</h3>
                            <p>Within 24 hours</p>
                        </div>
                    </div>
                </div>

                <form action="" class="contact-form">
                    <input type="hidden" name="_subject" value="New Contact Form Submission">
                    <input type="hidden" name="_captcha" value="false">
                    <input type="hidden" name="_next" value="">

                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" name="name" id="name" required placeholder="Your name">
                    </div>

                    <div class="form-group">
                        <label for="email">Emali</label>
                        <input type="email" name="email" id="email" required placeholder="your.email@example.com">
                    </div>

                    <div class="form-group">
                        <label for="subject">Subject</label>
                        <input type="text" id="subject" name="subject" required placeholder="What's this about">
                    </div>

                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea name="message" id="message" rows="6" required placeholder="your message here...."></textarea>
                    </div>

                    <button type="submit" class="submit-btn">
                        <i class="fa-regular fa-paper-plane"></i>
                        Send Message
                    </button>
                </form>
            </div>
        </div>
    </section>
    
</body>
</html>
