<html lang="en">
<head>

    <script src="https://kit.fontawesome.com/9fcb8631fd.js" crossorigin="anonymous"></script>
</head>

<body>
    <video class="back-vid" autoplay loop muted playsinline src="videos/galaxy.mp4"></video>

    <div class="vibrant-overlay"></div>

    <header>
        <div class="nav-wrapper">
            <div class="logo">
                <img src="images/mee.png" alt="logo" />
                <span>Tanish</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>

                <li><a href="#info-section">About</a></li>
                <li><a href="#experience-card">Experience</a></li>
            </ul>
            <div class="socials">
                <a target="_blank" href="https://github.com/shahtanish-bit"><i class="fa-brands fa-github"></i></a>
                <a target="_blank" href="#"><i class="fa-brands fa-linkedin"></i></a>
                <a target="_blank" href="https://www.instagram.com/tanish_shah.100/"><i class="fa-brands fa-instagram"></i></a>
            </div>

            <div class="menu-icon">
                <i class='bx bx-menu'></i>
            </div>
        </div>
    </header>

    <div class="sidebar">
        <div class="close-icon">
            <i class='bx bx-x'></i>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="mailto:shahtansih0165@gmail.com">My E-mail</a></li>
            <li><a href="#info-section">About</a></li>
            <li><a href="#experience-card">Experience</a></li>
        </ul>
        <div class="socials">
            <a target="_blank" href="#"><i class="fa-brands fa-linkedin"></i></a>
            <a target="_blank" href="https://github.com/shahtanish-bit"><i class="fa-brands fa-github"></i></a>
            <a target="_blank" href="https://www.instagram.com/tanish_shah.100/"><i class="fa-brands fa-instagram"></i></a>
        </div>
    </div>

    <main>
        <section class="contact-section">
            <div class="contact-container">
                <div class="contact-header">
                    <h1>Lets work together</h1>
                    <p>Wanna work together? Feel free to reach out !!</p>
                </div>

                <div class="contact-content">
                    <div class="contact-info">
                        <div class="info-item">
                            <i class="fa-solid fa-envelope"></i>
                            <div>
                                <h3>Email</h3>
                                <p><a href="mailto:shahtansih0165@gmail.com">shahtansih0165@gmail.com</a></p>
                            </div>
                        </div>
                        <div class="info-item">
                            <i class="fa-solid fa-location-dot"></i>
                            <div>
                                <h3>Location</h3>
                                <p>Nepal</p>
                            </div>
                        </div>
                        <div class="info-item">
                            <i class="fa-solid fa-clock"></i>
                            <div>
                                <h3>Response Time</h3>
                                <p>Within 24 hours</p>
                            </div>
                        </div>
                    </div>

                    <form action="https://api.web3forms.com/submit" method="POST" class="contact-form">
                        <input type="hidden" name="access_key" value="fc377ef3-8de2-4184-9fac-1ce6dc495b32">
                        <input type="hidden" name="_subject" value="New Contact Form Submission">
                        <input type="hidden" name="_captcha" value="false">
                        <input type="hidden" name="_next" value="">

                        <div class="form-group">
                            <label for="name">Name</label>
                            <input type="text" name="name" id="name" required placeholder="Your name">
                        </div>

                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" name="email" id="email" required placeholder="your.email@example.com">
                        </div>

                        <div class="form-group">
                            <label for="subject">Subject</label>
                            <input type="text" id="subject" name="subject" required placeholder="What's this about">
                        </div>

                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea name="message" id="message" rows="6" required placeholder="Write your message here...."></textarea>
                        </div>

                        <button type="submit" class="submit-btn">
                            <i class="fa-regular fa-paper-plane"></i>
                            Send Message
                        </button>
                    </form>
                </div>
            </div>
        </section>
    </main>
    
    <script src="app.js"></script>
</body>
</html>
